<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigated Institute Nexus (NIN)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0F2A5F;
            --accent-teal: #0F525F;
            --accent-indigo: #1C0F5F;
            --bg-dark: #0a0e1a;
            --bg-card: rgba(15, 42, 95, 0.4);
            --text-primary: #e0e6f0;
            --text-secondary: #8a9bb8;
            --text-muted: #5a6b88;
            --border: rgba(15, 82, 95, 0.3);
            --glow: rgba(15, 82, 95, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Background Layer */
        .background-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(15, 42, 95, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(28, 15, 95, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(15, 82, 95, 0.1) 0%, transparent 70%),
                var(--bg-dark);
        }

        .noise-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .stars {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(200, 220, 255, 0.6);
            border-radius: 50%;
        }

        /* UI Root */
        .ui-root {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Logo Anchor */
        .logo-anchor {
            position: absolute;
            z-index: 100;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-anchor.center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo-anchor.top-left {
            top: 20px;
            left: 24px;
            transform: translate(0, 0) scale(0.8);
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-teal), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: white;
            box-shadow: 0 0 30px rgba(15, 82, 95, 0.4);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .logo-anchor.top-left .logo-icon {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-10px);
        }

        .logo-anchor.top-left .logo-text {
            opacity: 1;
            transform: translateX(0);
            font-size: 18px;
        }

        .logo-anchor.center .logo-text {
            opacity: 0;
            transform: translateX(-10px);
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 72px;
            z-index: 90;
            display: flex;
            align-items: center;
            padding: 0 24px 0 140px;
            gap: 32px;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
            background: linear-gradient(180deg, rgba(10, 14, 26, 0.9) 0%, transparent 100%);
        }

        .navbar.visible {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .nav-item {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 6px;
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(15, 82, 95, 0.2);
        }

        .nav-item.active {
            color: var(--text-primary);
            background: rgba(15, 82, 95, 0.3);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 12px;
            right: 12px;
            height: 2px;
            background: var(--accent-teal);
            border-radius: 1px;
        }

        /* Hero Section */
        .hero-section {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .hero-content {
            text-align: center;
            margin-top: 80px;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -1px;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
            transition-delay: 0.1s;
        }

        .hero-cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
            transition-delay: 0.2s;
        }

        .hero-secondary {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
            transition-delay: 0.3s;
        }

        .hero-section.loaded .hero-title,
        .hero-section.loaded .hero-subtitle,
        .hero-section.loaded .hero-cta-group,
        .hero-section.loaded .hero-secondary {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-section.compressed {
            transform: scale(0.95);
            opacity: 0.6;
            filter: blur(1px);
        }

        .hero-section.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        /* CTA Buttons */
        .cta-btn {
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
        }

        .cta-btn.primary {
            background: linear-gradient(135deg, var(--accent-teal), var(--primary));
            color: white;
            box-shadow: 0 4px 20px rgba(15, 82, 95, 0.3);
        }

        .cta-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(15, 82, 95, 0.5);
        }

        .cta-btn.secondary {
            background: rgba(15, 42, 95, 0.3);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .cta-btn.secondary:hover {
            background: rgba(15, 42, 95, 0.5);
            color: var(--text-primary);
            border-color: var(--accent-teal);
        }

        .cta-btn.small {
            padding: 10px 24px;
            font-size: 13px;
            opacity: 0.7;
        }

        .cta-btn.small:hover {
            opacity: 1;
        }

        /* Student View */
        .student-view {
            position: absolute;
            top: 72px; left: 0;
            width: 100%;
            height: calc(100vh - 72px);
            z-index: 20;
            overflow-y: auto;
            padding: 24px 32px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }

        .student-view.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .student-view.collapsing {
            opacity: 0;
            transform: translateY(-10px) scale(0.98);
        }

        /* Search Module */
        .search-module {
            max-width: 700px;
            margin: 0 auto 40px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
        }

        .student-view.visible .search-module {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.1s;
        }

        .search-box {
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-box:focus {
            border-color: var(--accent-teal);
            box-shadow: 0 0 20px rgba(15, 82, 95, 0.2);
        }

        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto 40px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
        }

        .student-view.visible .category-grid {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.2s;
        }

        .category-card {
            padding: 20px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .category-card:hover {
            border-color: var(--accent-teal);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(15, 82, 95, 0.2);
        }

        .category-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .category-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Content Cards */
        .content-area {
            max-width: 900px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
        }

        .student-view.visible .content-area {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.3s;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .content-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .content-card {
            padding: 20px 24px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .content-card:hover {
            border-color: var(--accent-teal);
            transform: translateX(4px);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: rgba(15, 82, 95, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        /* Section transitions */
        .section-content {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .section-content.inactive {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .section-content.active {
            opacity: 1;
            max-height: 2000px;
        }

        /* Scrollbar */
        .student-view::-webkit-scrollbar {
            width: 6px;
        }

        .student-view::-webkit-scrollbar-track {
            background: transparent;
        }

        .student-view::-webkit-scrollbar-thumb {
            background: rgba(15, 82, 95, 0.3);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title { font-size: 32px; }
            .hero-cta-group { flex-direction: column; }
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .navbar { padding-left: 120px; gap: 16px; }
            .nav-item { font-size: 12px; padding: 4px 8px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── STATE MACHINE CONSTANTS ───
        const STATE_HOME = 'STATE_HOME';
        const STATE_TRANSITION_TO_STUDENT = 'STATE_TRANSITION_TO_STUDENT';
        const STATE_STUDENT = 'STATE_STUDENT';
        const STATE_TRANSITION_TO_HOME = 'STATE_TRANSITION_TO_HOME';

        // ─── STAR BACKGROUND COMPONENT ───
        function StarBackground() {
            const stars = Array.from({ length: 80 }, (_, i) => ({
                id: i,
                left: Math.random() * 100,
                top: Math.random() * 100,
                size: Math.random() * 2 + 1,
                opacity: Math.random() * 0.5 + 0.2,
                delay: Math.random() * 5
            }));

            return (
                <div className="background-layer">
                    <div className="noise-overlay"></div>
                    <div className="stars">
                        {stars.map(star => (
                            <div
                                key={star.id}
                                className="star"
                                style={{
                                    left: `${star.left}%`,
                                    top: `${star.top}%`,
                                    width: `${star.size}px`,
                                    height: `${star.size}px`,
                                    opacity: star.opacity,
                                    animationDelay: `${star.delay}s`
                                }}
                            />
                        ))}
                    </div>
                </div>
            );
        }

        // ─── LOGO ANCHOR COMPONENT ───
        function LogoAnchor({ state, onClick }) {
            const isCenter = state === STATE_HOME || state === STATE_TRANSITION_TO_HOME;
            const isTopLeft = state === STATE_STUDENT || state === STATE_TRANSITION_TO_STUDENT;

            return (
                <div 
                    className={`logo-anchor ${isCenter ? 'center' : ''} ${isTopLeft ? 'top-left' : ''}`}
                    onClick={onClick}
                >
                    <div className="logo-icon">NIN</div>
                    <div className="logo-text">Navigated Institute</div>
                </div>
            );
        }

        // ─── NAVBAR COMPONENT ───
        function Navbar({ visible, activeSection, onNavClick }) {
            const navItems = ['Dashboard', 'Courses', 'Opinions', 'Resources', 'Community'];

            return (
                <div className={`navbar ${visible ? 'visible' : ''}`}>
                    {navItems.map(item => (
                        <div
                            key={item}
                            className={`nav-item ${activeSection === item.toLowerCase() ? 'active' : ''}`}
                            onClick={() => onNavClick(item.toLowerCase())}
                        >
                            {item}
                        </div>
                    ))}
                </div>
            );
        }

        // ─── HERO SECTION ───
        function HeroSection({ state, onCtaClick }) {
            const [loaded, setLoaded] = useState(false);

            useEffect(() => {
                if (state === STATE_HOME) {
                    const timer = setTimeout(() => setLoaded(true), 100);
                    return () => clearTimeout(timer);
                } else {
                    setLoaded(false);
                }
            }, [state]);

            const isCompressed = state === STATE_TRANSITION_TO_STUDENT;
            const isHidden = state === STATE_STUDENT || state === STATE_TRANSITION_TO_HOME;

            return (
                <div className={`hero-section ${loaded ? 'loaded' : ''} ${isCompressed ? 'compressed' : ''} ${isHidden ? 'hidden' : ''}`}>
                    <div className="hero-content">
                        <h1 className="hero-title">Navigated Institute Nexus</h1>
                        <p className="hero-subtitle">Your gateway to knowledge, connections, and growth</p>
                        <div className="hero-cta-group">
                            <button className="cta-btn primary" onClick={() => onCtaClick('parent')}>Parent</button>
                            <button className="cta-btn primary" onClick={() => onCtaClick('student')}>Student</button>
                            <button className="cta-btn primary" onClick={() => onCtaClick('professional')}>Professional</button>
                        </div>
                        <div className="hero-secondary">
                            <button className="cta-btn secondary small" onClick={() => onCtaClick('institute')}>Institute</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── STUDENT VIEW ───
        function StudentView({ state, activeSection, onNavClick }) {
            const isVisible = state === STATE_STUDENT;
            const isCollapsing = state === STATE_TRANSITION_TO_HOME;

            const categories = [
                { icon: '📚', name: 'Mathematics', count: '24 courses' },
                { icon: '🔬', name: 'Science', count: '18 courses' },
                { icon: '💻', name: 'Technology', count: '32 courses' },
                { icon: '🎨', name: 'Arts', count: '15 courses' },
                { icon: '🌍', name: 'Languages', count: '12 courses' },
                { icon: '📊', name: 'Business', count: '20 courses' },
            ];

            const contentData = {
                dashboard: [
                    { icon: '📈', title: 'Learning Progress', desc: 'You have completed 68% of your current course', meta: 'Updated 2h ago' },
                    { icon: '🏆', title: 'Recent Achievement', desc: 'Completed Advanced Calculus module with distinction', meta: 'Yesterday' },
                    { icon: '📅', title: 'Upcoming Session', desc: 'Group study: Physics Problem Solving', meta: 'Today, 3:00 PM' },
                    { icon: '💬', title: 'New Discussion', desc: '3 new replies in your subscribed threads', meta: '5 min ago' },
                ],
                courses: [
                    { icon: '📐', title: 'Advanced Calculus II', desc: 'Multivariable calculus and differential equations', meta: '12 weeks · 85% complete' },
                    { icon: '⚛️', title: 'Quantum Mechanics', desc: 'Fundamentals of quantum physics', meta: '16 weeks · 42% complete' },
                    { icon: '🔌', title: 'Circuit Analysis', desc: 'AC/DC circuits and signal processing', meta: '10 weeks · 60% complete' },
                    { icon: '🧬', title: 'Molecular Biology', desc: 'DNA replication and protein synthesis', meta: '14 weeks · 30% complete' },
                ],
                opinions: [
                    { icon: '📝', title: 'Course Feedback: Calculus II', desc: 'Share your thoughts on the latest module', meta: 'Due in 3 days' },
                    { icon: '📊', title: 'Institute Survey 2024', desc: 'Help us improve your learning experience', meta: '5 min survey' },
                    { icon: '⭐', title: 'Rate Your Mentor', desc: 'Dr. Sarah Chen - Weekly evaluation', meta: 'Due this week' },
                    { icon: '🤝', title: 'Peer Review Request', desc: '3 students requested your feedback', meta: 'Pending' },
                ],
                resources: [
                    { icon: '📖', title: 'Digital Library Access', desc: '50,000+ academic papers and textbooks', meta: 'Available 24/7' },
                    { icon: '🎥', title: 'Video Lecture Archive', desc: 'Recorded sessions from all departments', meta: '2,400+ videos' },
                    { icon: '🔧', title: 'Lab Simulation Tools', desc: 'Virtual experiments and simulations', meta: 'Interactive' },
                    { icon: '📱', title: 'Mobile Learning App', desc: 'Study on the go with offline access', meta: 'iOS & Android' },
                ],
                community: [
                    { icon: '👥', title: 'Study Groups', desc: 'Join 12 active groups in your field', meta: '340 members online' },
                    { icon: '📢', title: 'Announcements', desc: 'Institute news and event updates', meta: '3 new posts' },
                    { icon: '❓', title: 'Q&A Forum', desc: 'Get help from peers and mentors', meta: '156 unanswered' },
                    { icon: '🎉', title: 'Events Calendar', desc: 'Webinars, workshops, and meetups', meta: '8 upcoming' },
                ],
            };

            const currentContent = contentData[activeSection] || contentData.dashboard;

            return (
                <div className={`student-view ${isVisible ? 'visible' : ''} ${isCollapsing ? 'collapsing' : ''}`}>
                    {/* Search Module */}
                    <div className="search-module">
                        <input 
                            type="text" 
                            className="search-box" 
                            placeholder="Search courses, resources, mentors..."
                        />
                    </div>

                    {/* Category Grid */}
                    <div className="category-grid">
                        {categories.map((cat, i) => (
                            <div key={i} className="category-card">
                                <div className="category-icon">{cat.icon}</div>
                                <div className="category-name">{cat.name}</div>
                                <div className="category-count">{cat.count}</div>
                            </div>
                        ))}
                    </div>

                    {/* Content Area */}
                    <div className="content-area">
                        <div className="section-header">
                            <h2 className="section-title">
                                {activeSection.charAt(0).toUpperCase() + activeSection.slice(1)}
                            </h2>
                        </div>
                        <div className="content-cards">
                            {currentContent.map((item, i) => (
                                <div key={i} className="content-card">
                                    <div className="card-icon">{item.icon}</div>
                                    <div className="card-info">
                                        <div className="card-title">{item.title}</div>
                                        <div className="card-desc">{item.desc}</div>
                                        <div className="card-meta">{item.meta}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ─── MAIN APP ───
        function App() {
            const [state, setState] = useState(STATE_HOME);
            const [activeSection, setActiveSection] = useState('dashboard');
            const transitionTimerRef = useRef(null);

            // Clear any pending transitions on unmount
            useEffect(() => {
                return () => {
                    if (transitionTimerRef.current) {
                        clearTimeout(transitionTimerRef.current);
                    }
                };
            }, []);

            const handleCtaClick = useCallback((type) => {
                if (type === 'student') {
                    // PHASE A: Start transition to student
                    setState(STATE_TRANSITION_TO_STUDENT);

                    // PHASE C: After animation completes, switch to student state
                    transitionTimerRef.current = setTimeout(() => {
                        setState(STATE_STUDENT);
                    }, 800);
                }
            }, []);

            const handleLogoClick = useCallback(() => {
                if (state === STATE_STUDENT || state === STATE_TRANSITION_TO_STUDENT) {
                    // PHASE A: Start transition back to home
                    setState(STATE_TRANSITION_TO_HOME);

                    // PHASE C: After animation completes, restore home state
                    transitionTimerRef.current = setTimeout(() => {
                        setState(STATE_HOME);
                    }, 800);
                }
            }, [state]);

            const handleNavClick = useCallback((section) => {
                setActiveSection(section);
            }, []);

            const showNavbar = state === STATE_STUDENT || state === STATE_TRANSITION_TO_STUDENT || state === STATE_TRANSITION_TO_HOME;

            return (
                <div id="app">
                    <StarBackground />
                    <div className="ui-root">
                        <LogoAnchor state={state} onClick={handleLogoClick} />
                        <Navbar 
                            visible={showNavbar} 
                            activeSection={activeSection} 
                            onNavClick={handleNavClick}
                        />
                        <HeroSection state={state} onCtaClick={handleCtaClick} />
                        <StudentView 
                            state={state} 
                            activeSection={activeSection}
                            onNavClick={handleNavClick}
                        />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
